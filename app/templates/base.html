<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{% block meta_description %}ArchLens - Repository Intelligence Platform for Engineering Analysis{% endblock %}" />
    <title>{% block title %}ArchLens{% endblock %}</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="/static/css/styles.css" />

    {% block head_extra %}{% endblock %}
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-inner container">
            <a href="/" class="nav-brand">
                <span class="brand-icon"></span>
                ArchLens
            </a>
            <ul class="nav-links">
                <li><a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Analyze</a></li>
                <li><a href="/history" class="nav-link {% if request.url.path == '/history' %}active{% endif %}">History</a></li>
                <li><a href="/health" class="nav-link" target="_blank">Health</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-inner">
            <span class="footer-text">ArchLens &mdash; Repository Intelligence Platform</span>
            <span class="footer-text">Built with FastAPI and Python</span>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
